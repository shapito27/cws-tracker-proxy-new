name = "cws-tracker-proxy-new"
main = "src/index.ts"
compatibility_date = "2024-12-30"
compatibility_flags = ["nodejs_compat"]

[vars]
ENVIRONMENT = "production"
# API_KEYS is a SECRET, not a plaintext var — never commit it here.
# Production:  npx wrangler secret put API_KEYS   (or set during one-click deploy)
# Local dev:   copy .dev.vars.example -> .dev.vars (gitignored)
# Rate limit: using Cloudflare's built-in rate limiting
# Configure via dashboard or add rules here

[dev]
port = 8787
